spring.application.name=arcflow-backend

# Server (8080/8081 are commonly taken by local Airflow; arcflow uses 8090)
server.port=8090

# Actuator — expose health & info for ops dashboards
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# CORS: comma-separated list of allowed frontend origins
arcflow.cors.allowed-origins=http://localhost:3000
